apiVersion: apps/v1
kind: Deployment
metadata:
  name: kevin-testing-loop-messages
  labels:
    app: loop-test
spec:
  replicas: 111
  selector:
    matchLabels:
      app: kevin-test
  template:
    metadata:
      labels:
        app: kevin-test
    spec:
      containers:
        - name: kevin-test-loop-python
          image: ghcr.io/kevinpinscoe/python-docker-fun:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
